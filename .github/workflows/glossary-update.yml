name: Glossary Quarterly Update

on:
  schedule:
    - cron: "0 0 1 1,4,7,10 *"  # First day of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsx scripts/update-glossary.ts
      - run: pnpm tsx scripts/fetch-images.ts --collection glossary --new-only
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/glossary/ src/assets/images/auto/glossary/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "glossary: quarterly update $(date -u +%Y-%m-%d)"
          git push

  notify-failure:
    if: failure()
    needs: [update]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Create failure issue
        run: |
          gh issue create \
            --title "Workflow 失敗: ${{ github.workflow }} $(date -u +%Y-%m-%d)" \
            --body "## 失敗詳情

          - **Workflow:** ${{ github.workflow }}
          - **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **觸發:** ${{ github.event_name }}
          - **時間:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          請檢查 workflow run 日誌。" \
            --label "bug,automation"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
