name: Insights Automation

on:
  schedule:
    - cron: "0 0 * * 2,5"  # UTC = TPE Tue/Fri 08:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate insight article
        id: generate
        run: pnpm tsx scripts/generate-insights.ts
      - name: Fetch images for new articles
        run: pnpm tsx scripts/fetch-images.ts --collection insights --new-only
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/insights/ src/assets/images/auto/insights/ data/processed-insights.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "insights: auto-generated $(date -u +%Y-%m-%d)"
          git push
      - name: Create PR for non-converged drafts
        if: steps.generate.outputs.has_drafts == 'true'
        run: |
          BRANCH="insights/review-$(date -u +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add src/content/insights/
          git diff --cached --quiet && exit 0
          git commit -m "insights: drafts pending review $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "Insights: reviewer 未收斂，需人工審核 $(date -u +%Y-%m-%d)" \
            --body "以下專題文章經 3 次 reviewer 迴圈仍未收斂，已標記為 draft: true。" \
            --base main --label "needs-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    if: failure()
    needs: [generate]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Create failure issue
        run: |
          gh issue create \
            --title "Workflow 失敗: ${{ github.workflow }} $(date -u +%Y-%m-%d)" \
            --body "## 失敗詳情

          - **Workflow:** ${{ github.workflow }}
          - **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **觸發:** ${{ github.event_name }}
          - **時間:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          請檢查 workflow run 日誌。" \
            --label "bug,automation"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
