name: Content Quality Audit

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run content audit
        run: pnpm tsx scripts/audit-content.ts
      - name: Create audit report issue
        if: always()
        run: |
          if [ -f audit-report.md ]; then
            gh issue create \
              --title "內容品質審查報告 $(date -u +%Y-Q$(($(date +%m)/4+1)))" \
              --body-file audit-report.md \
              --label "content-audit"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    if: failure()
    needs: [audit]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v7
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_NAME: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          gh issue create \
            --title "Workflow 失敗: $WF_NAME $(date -u +%Y-%m-%d)" \
            --body "## 失敗詳情

          - **Workflow:** $WF_NAME
          - **Run:** $SERVER_URL/$REPO/actions/runs/$RUN_ID
          - **觸發:** $EVENT_NAME
          - **時間:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          請檢查 workflow run 日誌。" \
            --label "bug"
