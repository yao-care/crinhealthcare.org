name: Content Quality Audit

on:
  schedule:
    - cron: "0 0 20 1,4,7,10 *"  # 20th of Jan/Apr/Jul/Oct
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run content audit
        run: pnpm tsx scripts/audit-content.ts
      - name: Create audit report issue
        if: always()
        run: |
          if [ -f audit-report.md ]; then
            gh issue create \
              --title "內容品質審查報告 $(date -u +%Y-Q$(($(date +%m)/4+1)))" \
              --body-file audit-report.md \
              --label "content-audit"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    if: failure()
    needs: [audit]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Create failure issue
        run: |
          gh issue create \
            --title "Workflow 失敗: ${{ github.workflow }} $(date -u +%Y-%m-%d)" \
            --body "## 失敗詳情

          - **Workflow:** ${{ github.workflow }}
          - **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **觸發:** ${{ github.event_name }}
          - **時間:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          請檢查 workflow run 日誌。" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
