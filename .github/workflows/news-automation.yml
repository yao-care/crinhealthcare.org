name: News Automation

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate news articles
        id: generate
        run: pnpm tsx scripts/generate-news.ts
      - name: Fetch images for new articles
        run: pnpm tsx scripts/fetch-images.ts --collection news --new-only
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for p in src/content/news/ src/assets/images/auto/news/ data/processed-sources.json; do
            [ -e "$p" ] && git add "$p"
          done
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "news: auto-generated $(date -u +%Y-%m-%d)"
          git push
      - name: Create PR for non-converged drafts
        if: steps.generate.outputs.has_drafts == 'true'
        run: |
          BRANCH="news/review-$(date -u +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add src/content/news/
          git diff --cached --quiet && exit 0
          git commit -m "news: drafts pending review $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "News: reviewer 未收斂，需人工審核 $(date -u +%Y-%m-%d)" \
            --body "以下新聞經 3 次 reviewer 迴圈仍未收斂，已標記為 draft: true。" \
            --base main --label "needs-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    if: failure()
    needs: [generate]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_NAME: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          gh issue create \
            --title "Workflow 失敗: $WF_NAME $(date -u +%Y-%m-%d)" \
            --body "## 失敗詳情

          - **Workflow:** $WF_NAME
          - **Run:** $SERVER_URL/$REPO/actions/runs/$RUN_ID
          - **觸發:** $EVENT_NAME
          - **時間:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          請檢查 workflow run 日誌。" \
            --label "bug"
